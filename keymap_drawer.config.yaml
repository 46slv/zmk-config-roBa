draw_config:
  n_columns: 1
  append_minus_to_type_plus: true

parse_config:
  preprocess: true
  skip_unrecognized_commands: true
  
  zmk_keycode_map:
    "LS(N2)": "\""
    "LS(N6)": "&"
    "LS(N7)": "'"
    "LS(N8)": "("
    "LS(N9)": ")"
    "LS(EQUAL)": "^"
    "LS(SCLN)": "+"
    "LS(QUOT)": "*"
    "LS(LBKT)": "{"
    "LS(RBKT)": "}"
    "LS(BSLH)": "|"
    "LBKT": "@"
    "RBKT": "["
    "BSLH": "]"
    "NON_US_HASH": "]"
    "SCLN": ";"
    "QUOT": ":"
    "INT_MUHENKAN": "無変換"
    "INT_HENKAN": "変換"
    "INT_KANA": "ひらがな"
    "INT1": "ろ"
    "LS(INT1)": "_"
    "0x87": "ろ"
    "LS(0x87)": "_"
    "LGUI": "Win"
    "LCTRL": "Ctrl"
    "LALT": "Alt"
    "LSHFT": "Shift"

  trans_legend:
    t: "▽"
    type: "trans"
