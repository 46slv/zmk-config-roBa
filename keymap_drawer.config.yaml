draw_config:
  n_columns: 1
  append_minus_to_type_plus: true

parse_config:
  preprocess: true
  skip_unrecognized_commands: true
  
  zmk_keycode_map:
    # --- 数字行（Shiftあり）のJIS変換 ---
    "LS(N1)": "!"
    "LS(N2)": "\""
    "LS(N3)": "#"
    "LS(N4)": "$"
    "LS(N5)": "%"
    "LS(N6)": "&"
    "LS(N7)": "'"
    "LS(N8)": "("
    "LS(N9)": ")"
    "LS(N0)": " " # JISではShift+0は何も印字されないか空欄
    "LS(MINUS)": "="
    "LS(EQUAL)": "~"

    # --- 記号キー単体（JIS位置） ---
    "AT": "@"
    "LBKT": "["
    "RBKT": "]"
    "NON_US_HASH": "]"
    "SCLN": ";"
    "QUOT": ":"
    "BSLH": "\\"
    "INT1": "ろ"
    "INT2": "ひらがな"
    "INT3": "¥"
    "GRAVE": "半/全"

    # --- 記号キー（Shiftあり / JIS位置） ---
    "LS(AT)": "`"
    "LS(LBKT)": "{"
    "LS(RBKT)": "}"
    "LS(NON_US_HASH)": "}"
    "LS(SCLN)": "+"
    "LS(QUOT)": "*"
    "LS(BSLH)": "_"
    "LS(INT1)": "_"
    "LS(INT3)": "|"
    "LS(COMMA)": "<"
    "LS(DOT)": ">"
    "LS(SLASH)": "?"

    # --- 日本語106/109固有キー ---
    "INT_MUHENKAN": "無変換"
    "INT_HENKAN": "変換"
    "INT_KANA": "かな"
    "LANGUAGE_1": "かな"
    "LANGUAGE_2": "英数"

    # --- 修飾キー・特殊操作の視認性向上 ---
    "LCTRL": "Ctrl"
    "RCTRL": "Ctrl"
    "LALT": "Alt"
    "RALT": "Alt"
    "LGUI": "Win"
    "RGUI": "Win"
    "LSHFT": "Shift"
    "RSHFT": "Shift"
    "UP": "↑"
    "DOWN": "↓"
    "LEFT": "←"
    "RIGHT": "→"
    "BSPC": "BS"
    "DEL": "Del"
    "RET": "Enter"
    "ENT": "Enter"
    "SPC": "Space"
    "ESC": "Esc"

  trans_legend:
    t: "▽"
    type: "trans"
