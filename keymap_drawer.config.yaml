draw_config:
  n_columns: 1
  append_minus_to_type_plus: true

parse_config:
  preprocess: true
  skip_unrecognized_commands: true
  
  # ZMKの物理キーコード名からJIS印字への翻訳（全JIS記号網羅）
  zmk_keycode_map:
    # 数字行 Shift
    "LS(N1)": "!"
    "LS(N2)": "\""
    "LS(N3)": "#"
    "LS(N4)": "$"
    "LS(N5)": "%"
    "LS(N6)": "&"
    "LS(N7)": "'"
    "LS(N8)": "("
    "LS(N9)": ")"
    "LS(N0)": " "
    "LS(MINUS)": "="
    "LS(EQUAL)": "~"

    # 記号単体 & Shift
    "AT": "@"
    "LS(AT)": "`"
    "LBKT": "["
    "LS(LBKT)": "{"
    "RBKT": "]"
    "LS(RBKT)": "}"
    "NON_US_HASH": "]"
    "LS(NON_US_HASH)": "}"
    "SCLN": ";"
    "LS(SCLN)": "+"
    "QUOT": ":"
    "LS(QUOT)": "*"
    "COMMA": ","
    "LS(COMMA)": "<"
    "DOT": "."
    "LS(DOT)": ">"
    "SLASH": "/"
    "LS(SLASH)": "?"
    "BSLH": "\\"
    "LS(BSLH)": "_"
    
    # JIS固有物理キー (106/109)
    "0x89": "¥"           # JP_YEN
    "LS(0x89)": "|"      # JP_PIPE
    "INT3": "¥"
    "LS(INT3)": "|"
    "0x87": "ろ"          # JP_RO / JP_UNDERSCORE
    "LS(0x87)": "_"
    "INT1": "ろ"
    "LS(INT1)": "_"
    "GRAVE": "半/全"
    "INT_MUHENKAN": "無変換"
    "INT_HENKAN": "変換"
    "LANGUAGE_1": "かな"
    "LANGUAGE_2": "英数"

    # 特殊記号（もしマクロ等で直接呼んでいる場合用）
    "C_AL_CALC": "Calc"
    "PRINTSCREEN": "PrtSc"

  # ユーザー様のカスタムBehavior（mod-morphなど）を直感的な表示に変換
  raw_binding_map:
    "mod_morph_exclamation": ", !"
    "mod_morph_question": ". ?"
    "mod_morph_slash": "/ \\"
    "tilde_morph": "ー 〜"
    "minis_morph": "- _"
    "td_colon": ": ;"
    "td_copy_paste": "Copy/Paste"
    "screenshot_copy": "SS Copy"
    "screensot_save": "SS Save"
    "windows_sleep": "Sleep"
    "JP_UNDERSCORE": "_"
    "JP_ASTERISK": "*"
    "JP_DQUOTE": "\""
    "JP_QUOTE": "'"
    "JP_PLUS": "+"
    "JP_CARET": "^"
    "JP_TILDE": "~"
    "JP_PIPE": "|"
    "JP_AT": "@"
    "JP_COLON": ":"
    "JP_LBRACKET": "["
    "JP_RBRACKET": "]"
    "JP_LPAREN": "("
    "JP_RPAREN": ")"
    "JP_LBRACE": "{"
    "JP_RBRACE": "}"
    "JP_KANA": "かな"
    "JP_EISU": "英数"
    "JP_HANZEN": "半/全"

  trans_legend:
    t: "▽"
    type: "trans"
