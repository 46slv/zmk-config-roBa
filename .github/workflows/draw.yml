name: "Draw Keymap"

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/draw.yml"
      - "config/roBa_L.keymap"
      - "config/roBa_R.keymap"
      - "config/roBa.keymap"
      - "keymap_drawer.config.yaml"
      - "config/roBa.dtsi"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@afd87c7268edc26dc293380debeab0b7d3a52cf8
    permissions:
      contents: write
    with:
      commit_message: "[Draw] ${{ github.event.head_commit.message || 'Update keymap drawing' }}"
      amend_commit: false
      keymap_patterns: "config/roBa.keymap"
      config_path: "keymap_drawer.config.yaml"
      output_folder: "keymap-drawer"
      parse_args: "roBa:--zmk-node 'keymap'" # roBaのノードを明示的に指定
      destination: "both"
