CONFIG_ZMK_KEYBOARD_NAME="roBa"

CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# --- トラックボール基本設定 ---
CONFIG_PMW3610_CPI=1200
CONFIG_PMW3610_CPI_DIVIDOR=1

# XY_SWAPが未定義エラーのため、ORIENTATION_90を使用して調整
CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_PMW3610_ORIENTATION_180=n
CONFIG_PMW3610_INVERT_X=n
# 垂直方向の調整が必要な場合はここを y に変更
CONFIG_PMW3610_INVERT_Y=n

# スクロール方向の維持
CONFIG_PMW3610_INVERT_SCROLL_X=y

# --- オートマウス・挙動制御 ---
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=700
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_MOVEMENT_THRESHOLD=0
CONFIG_PMW3610_POLLING_RATE_125_SW=y

# --- 省電力設定 ---
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_SCROLL_TICK=16

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_PMW3610=y

# --- LED Widget 設定 (依存関係の修正) ---
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_INTERVAL_MS=375
CONFIG_RGBLED_WIDGET_BATTERY_BLINK_MS=750
CONFIG_RGBLED_WIDGET_CONN_BLINK_MS=750
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

CONFIG_CHARGE_INDICATOR=y
CONFIG_LAYOUT_SHIFT_TARGET_JIS=y
